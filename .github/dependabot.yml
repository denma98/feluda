version: 2
updates:
  # Enable version updates for Docker (from docker-compose.yml)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Enable version updates for Dockerfiles inside /src
  - package-ecosystem: "docker"
    directory: "/src"
    schedule:
      interval: "weekly"

  # Enable version updates for uv (pyproject.toml in /)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - directory: "src/**"

  # Enable version updates for GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "weekly"
