version: 2
updates:
  # Enable version updates for Docker (from docker-compose.yml)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Enable version updates for Dockerfiles inside /src
  - package-ecosystem: "docker"
    directory: "/src"
    schedule:
      interval: "weekly"

  # Enable version updates for Python (requirements.txt in /src)
  - package-ecosystem: "pip"
    directory: "/src"
    schedule:
      interval: "weekly"

  # Enable version updates for Python (pyproject.toml in /)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Enable version updates for GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "weekly"
